global:
  resolve_timeout: 1m

route:
  receiver: local-webhook
  group_by: [alertname, service, severity]
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 4h

receivers:
  - name: local-webhook
    webhook_configs:
      - url: http://alert-receiver:8080/alerts
        send_resolved: true
